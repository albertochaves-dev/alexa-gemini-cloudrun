<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9168ff"/>
      <stop offset="1" stop-color="#6f42ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8a94a6"/>
    </marker>
    <marker id="arrowback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2ea043"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="1" y="1" width="978" height="468" rx="16" fill="#ffffff" stroke="#d0d7de"/>

  <text x="32" y="46" font-size="22" font-weight="700" fill="#1f2328">Momoru — request flow</text>
  <text x="32" y="70" font-size="13" fill="#57606a">Private Alexa skill · FastAPI on Cloud Run · Google Gemini · zero-cost serverless</text>

  <!-- nodes -->
  <!-- Echo Dot -->
  <g>
    <rect x="30" y="150" width="150" height="92" rx="12" fill="#eef4ff" stroke="#4285f4"/>
    <text x="105" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">Echo Dot</text>
    <text x="105" y="212" text-anchor="middle" font-size="11.5" fill="#57606a">voice in / out</text>
  </g>

  <!-- Alexa Cloud -->
  <g>
    <rect x="222" y="150" width="150" height="92" rx="12" fill="#e6fbff" stroke="#00b8d9"/>
    <text x="297" y="184" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">Alexa Cloud</text>
    <text x="297" y="205" text-anchor="middle" font-size="11.5" fill="#57606a">ASR + NLU</text>
    <text x="297" y="221" text-anchor="middle" font-size="11.5" fill="#57606a">signs request</text>
  </g>

  <!-- Firebase Hosting -->
  <g>
    <rect x="414" y="150" width="150" height="92" rx="12" fill="#fff6e6" stroke="#ffa000"/>
    <text x="489" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">Firebase Hosting</text>
    <text x="489" y="200" text-anchor="middle" font-size="11.5" fill="#57606a">momoru.dedyn.io</text>
    <text x="489" y="216" text-anchor="middle" font-size="11.5" fill="#57606a">TLS proxy (exact cert)</text>
  </g>

  <!-- Cloud Run -->
  <g>
    <rect x="606" y="150" width="150" height="92" rx="12" fill="#eef4ff" stroke="#4285f4"/>
    <text x="681" y="178" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">Cloud Run</text>
    <text x="681" y="198" text-anchor="middle" font-size="11.5" fill="#57606a">FastAPI backend</text>
    <text x="681" y="214" text-anchor="middle" font-size="11.5" fill="#57606a">verify · limit · call</text>
  </g>

  <!-- Gemini -->
  <g>
    <rect x="798" y="150" width="150" height="92" rx="12" fill="url(#gem)"/>
    <text x="873" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Gemini API</text>
    <text x="873" y="212" text-anchor="middle" font-size="11.5" fill="#e9e2ff">2.5 Flash</text>
  </g>

  <!-- forward arrows -->
  <line x1="180" y1="196" x2="222" y2="196" stroke="#8a94a6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="372" y1="196" x2="414" y2="196" stroke="#8a94a6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="564" y1="196" x2="606" y2="196" stroke="#8a94a6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="756" y1="196" x2="798" y2="196" stroke="#8a94a6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- arrow labels -->
  <text x="201" y="188" text-anchor="middle" font-size="10" fill="#8a94a6">HTTPS</text>
  <text x="393" y="188" text-anchor="middle" font-size="10" fill="#8a94a6">signed</text>
  <text x="585" y="188" text-anchor="middle" font-size="10" fill="#8a94a6">rewrite</text>
  <text x="777" y="188" text-anchor="middle" font-size="10" fill="#8a94a6">REST</text>

  <!-- return path: Gemini -> Echo Dot (voice answer) -->
  <path d="M873 242 L873 300 Q873 320 853 320 L125 320 Q105 320 105 300 L105 242"
        fill="none" stroke="#2ea043" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowback)"/>
  <text x="489" y="314" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2ea043">voice answer (SSML, distinct voice)</text>

  <!-- footnotes -->
  <text x="32" y="388" font-size="12" fill="#57606a">🔒  Signature + timestamp verification · proxy-aware rate limiting · secrets in Secret Manager</text>
  <text x="32" y="410" font-size="12" fill="#57606a">⚡  Gemini "thinking" disabled → ~0.5s answers, well under Alexa's ~8s budget</text>
  <text x="32" y="432" font-size="12" fill="#57606a">🚀  CI/CD via GitHub Actions + keyless Workload Identity Federation</text>
</svg>
